<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toggle darkmode</title>
    <style>
        @font-face {
            font-family: 'roboto';
            src: url(Roboto-Regular.ttf);
        }
        :root{
            --theme: white;
            --detail: #1e1e2f;
        }

        .dark{
            --theme: #1e1e2f;
            --detail: white;
        }

        *{
            font-family: 'roboto';
            padding: 0;
            margin: 0;
            transition: all 0.2s ease;
        }

        body{
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--theme);
        }
        button{
            padding: 0.6rem 1.3rem;
            flex: 0 0 auto;
            width: max-content;
            background: transparent;
            outline: none;
            border: 1px solid var(--detail);
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
            color: var(--detail);
            animation-name: fadein;
            animation-duration: 0.5s;
            animation-timing-function: ease;
            animation-delay: 0s;
        }
        button:hover{
            transform: scale(1.05);
        }
        button:active{
            transform: scale(1);
        }

        @keyframes fadein {
            from{
                opacity: 0;
                transform: translateY(10px);
            }to{
                opacity: 1;
                transform: translateY(0px);
            }
        }
    </style>
</head>
<body>
    <button id="tombol">
        dark
    </button>



    <script>
        const button = document.querySelector('#tombol');
        const tagHtml = document.documentElement.classList;

        button.addEventListener('click', ()=>{
            document.documentElement.classList.toggle('dark');
            if(tagHtml.contains('dark')){
                button.textContent = "light";
            }else{
                button.textContent = 'dark';
            }
        });
    </script>
</body>
</html>
