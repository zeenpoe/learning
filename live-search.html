<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live search</title>
    <style>
        @font-face {
            font-family: 'roboto';
            src: url(Roboto_Condensed-Regular.ttf);
        }

        :root{
            --utama: #FFF8E7;
            --blur-shadow: 10px;
        }

        *{
            font-family: 'roboto';
            padding: 0;
            margin: 0;
        }

        body{
            width: 100vw;
            max-width: 100vw;
            height: 100vh;
            max-height: 100vh;
            box-sizing: border-box;
            background: var(--utama);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 1rem 0;
        }

        .contain{
            background: white;
            width: 72%;
            max-width: 72%;
            height: 12.5rem;
            max-height: 12.5rem;
            border: 3px solid black;
            padding: 0.9rem;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            transition: all 0.2s ease;
            animation: fadeIn 0.5s ease-in-out;
        }


        h1{
            text-align: center;
        }

        .output{
            border: 3px solid black;
            width: 95%;
            height: 17.5%;
            max-height: 17.5%;
            box-shadow: 5px 6px 0 black;
            animation: berkeliling 1.5s linear infinite;
            overflow-x: auto;
            flex: 0 0 auto;
            box-sizing: border-box;
            padding: 0 0.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .contain-text{
            font-size: 1rem;
            position: relative;
            height: fit-content;
            padding: 0 2px;
            width: max-content;
        }
        .contain-text::before{
            content: '';
            position: absolute;
            right: 0%;
            height: 100%;
            width: 2px;
            background: #000;
            animation: pointer 0.5s ease 0.5s infinite alternate;
        }

        .input{
            padding: 0.6rem;
            background: white;
            border: 3px solid black;
            border-radius: 0.6rem;
            outline: none;
            width: 90%;
            max-width: 19.1rem;
            transition: all 0.2s ease;
            flex: 0 0 auto;
            font-size: 1rem;
        }
        
        .input:focus{
            box-shadow: 4px 5px 0 black;
        }

        .input::placeholder{
            font-size: 1rem;
        }

        @keyframes pointer {
            from{
                opacity: 0;
            }
            to{
                opacity: 1;
            }
        }
        @keyframes berkeliling {
            0%{
                box-shadow: 5px 6px 0 black;
            }
            25%{
                box-shadow: -5px 6px 0 black;
            }
            45%{
                box-shadow: -5px -6px 0 black;
            }
            70%{
                box-shadow: 5px -6px 0 black;
            }
            100%{
                box-shadow: 5px 6px 0 black;
            }
        }

        @keyframes fadeIn {
            from{
                opacity: 0;
                transform: translateY(15px);
            }
            to{
                opacity: 1;
                transform: translateY(0px);
            }
        }

        @media (min-width : 1024px) {
            body{
                justify-content: center;
            }

            .contain{
                width: max-content;
            }
            .output{
                width: 20rem;
            }
        }
    </style>
</head>
<body>
    <div class="contain">
        <h1>Live input, Try it</h1>
        <div class="output">
            <p class="contain-text"></p>
        </div>
        <input type="text" name="masukkan apapus" id="input" placeholder="masukkan apapun" class="input">
    </div>


    <script>
        const containText = document.querySelector('.contain-text');
        const input = document.querySelector('.input');

        input.addEventListener('input', ()=>{
            containText.textContent = input.value;
        });
    </script>
</body>
</html>
